name: Sync to Hugging Face
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "huggingface-sync@github.com"
          git config --global user.name "HF Sync"
          # Try to push main to main with explicit remote and force
          git remote add hf https://fakhir27:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/fakhir27/cryto-trading-brain
          git push hf main --force
