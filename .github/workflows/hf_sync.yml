name: Sync to Hugging Face
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Use the HF_TOKEN to push to the Hugging Face Space
          git push --force https://fakhir00:$HF_TOKEN@huggingface.co/spaces/fakhir00/cryto-trading-brain main
